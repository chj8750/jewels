<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>돌을 깨서 보석을 얻으세요</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
body{background:#0a0a0a;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:12px;font-family:"Pretendard",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
button{font:inherit;border:0;cursor:pointer;outline:0;background:0;padding:0}
.phone{width:390px;height:844px;background:#141414;border-radius:44px;overflow:hidden;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.scr{height:100%;display:none;flex-direction:column;background:#141414}
.scr.on{display:flex}

/* Status */
.st{height:44px;padding:12px 20px 0;display:flex;justify-content:space-between;font-size:11px;font-weight:600;color:rgba(255,255,255,.5);flex-shrink:0}

/* Main content - absolute positioning like Figma */
.main{flex:1;position:relative;overflow:hidden}

/* Title - centered */
.title{position:absolute;top:72px;left:50%;transform:translateX(-50%);font-size:24px;font-weight:600;color:#fff;text-align:center;letter-spacing:-.48px;white-space:nowrap}

/* Subtitle */
.subtitle{position:absolute;top:111px;left:50%;transform:translateX(-50%);font-size:14px;font-weight:400;color:rgba(255,255,255,.7);text-align:center;letter-spacing:-.28px;white-space:nowrap}

/* Progress bar container */
.progress{position:absolute;top:181px;left:40px;width:310px}
.progress-bar{height:12px;background:#2a3036;border-radius:100px;overflow:hidden;position:relative}
.progress-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,#6c4fff,#5e99ff,#f394ff);transition:width .2s;width:50%}
.progress-text{position:absolute;right:0;top:16px;font-size:14px;font-weight:600;color:#768a97}

/* Small hammer on progress bar */
.hammer-sm{position:absolute;left:calc(50% + 2px);top:-6px;width:24px;height:24px;z-index:2;transform:rotate(-15deg);transform-origin:12px 22px;transition:transform .1s;pointer-events:none}
.hammer-sm:active{transform:rotate(0deg)}
.hammer-sm img,.hammer-lg img{width:100%;height:100%;object-fit:contain}

/* Rock - main interactive element */
.rock{position:absolute;left:50%;top:246px;width:265px;height:275px;transform:translateX(-50%);cursor:pointer;z-index:3;transition:transform .12s}
.rock img{width:100%;height:100%;object-fit:contain;pointer-events:none}
.rock:active img{transform:scale(.94)}
.rock.shrink img{transform:scale(var(--rs,1))}

/* Large hammer */
.hammer-lg{position:absolute;left:219px;top:342px;width:126px;height:126px;z-index:4;pointer-events:none;filter:drop-shadow(0 24px 14px rgba(0,0,0,.85));transform:rotate(-15deg);transform-origin:20px 80px;transition:transform .08s}
.hammer-lg.swing{transform:rotate(6deg)}
.hammer-lg img{width:100%;height:100%;object-fit:contain}

/* Hit effect */
.hit{position:absolute;left:50%;top:50%;width:200px;height:200px;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(circle,rgba(108,79,255,.2),transparent 70%);opacity:0;pointer-events:none;z-index:2;transition:opacity .08s}
.hit.on{opacity:1}
.hit.off{opacity:0}

/* Bottom card */
.card{position:absolute;left:40px;top:559px;width:310px;background:#2a3036;border-radius:20px;padding:18px 20px;display:flex;flex-direction:column;gap:16px}
.card-row{display:flex;align-items:center;justify-content:space-between}
.card-text{font-size:16px;font-weight:700;color:#fff;letter-spacing:-.32px;display:flex;gap:8px;align-items:center}
.card-text .count{color:#9fa9ff}
.card-btn{display:flex;align-items:center;gap:4px;padding:6px 8px 6px 6px;border-radius:8px;background:linear-gradient(71deg,#6c4fff 17%,#5e99ff 69%,#f394ff 107%);color:#fff;font-size:11px;font-weight:600;cursor:pointer;transition:opacity .12s}
.card-btn:active{opacity:.8}
.card-btn .icon{width:16px;height:16px}
.card-btn .icon img{width:100%;height:100%;object-fit:contain}

/* Gem row */
.gem-row{display:flex;gap:10px}
.gem-item{width:40px;height:32px;border-radius:4px;overflow:hidden;transition:opacity .2s}
.gem-item img{width:100%;height:100%;object-fit:cover;object-position:bottom}
.gem-item.faded{opacity:.2}

/* Particles on hit */
@keyframes pf{0%{opacity:0;transform:translate(0,0) scale(0)}25%{opacity:1}100%{opacity:0;transform:translate(var(--px),var(--py)) scale(var(--ps))}}
.particles{position:absolute;inset:0;pointer-events:none;z-index:5}
.p{position:absolute;width:6px;height:6px;border-radius:50%;opacity:0;animation:pf .5s ease forwards}

/* Result popup - appears when rock breaks */
.popup{position:absolute;inset:0;background:rgba(0,0,0,.55);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:10;backdrop-filter:blur(4px);padding:24px}
.popup.on{display:flex}
.popup-card{background:#1c1c1c;border:1px solid rgba(255,255,255,.06);border-radius:24px;padding:32px 28px;text-align:center;width:310px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.popup-card .gem-display{width:80px;height:80px;border-radius:50%;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:36px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05)}
.popup-card h2{font-size:20px;font-weight:700;color:#fff;margin-bottom:4px}
.popup-card .value{font-size:14px;font-weight:600;color:#9fa9ff;margin-bottom:16px}
.popup-card .popup-btn{width:100%;height:46px;border-radius:10px;background:linear-gradient(90deg,#6c4fff,#5e99ff,#f394ff);color:#fff;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:8px}
.popup-card .popup-btn:active{opacity:.85}

/* Ad overlay */
.ad{position:absolute;inset:0;background:rgba(0,0,0,.75);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:11;backdrop-filter:blur(3px)}
.ad.on{display:flex}
.ad-box{text-align:center}
.ad-box h2{font-size:16px;font-weight:700;color:#fff;margin-bottom:16px}
.ad-timer{width:60px;height:60px;border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;position:relative;background:conic-gradient(#6c4fff var(--ap,0%),rgba(255,255,255,.06) 0%)}
.ad-timer::before{content:"";position:absolute;inset:3px;border-radius:50%;background:#141414}
.ad-timer span{position:relative;z-index:1;font-size:20px;font-weight:800;color:#9fa9ff}
.ad-box p{font-size:12px;color:rgba(255,255,255,.3);font-weight:500}

/* Toast */
.toast{position:absolute;left:20px;right:20px;bottom:90px;background:rgba(108,79,255,.25);backdrop-filter:blur(8px);border:1px solid rgba(108,79,255,.15);border-radius:10px;padding:10px 14px;font-size:12px;font-weight:700;color:#fff;display:none;z-index:12;text-align:center}
.toast.on{display:block;animation:ti 1.8s ease forwards}
@keyframes ti{0%{opacity:0;transform:translateY(8px)}15%,75%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-4px)}}
</style>
</head>
<body>
<div class="phone">

<!-- === MAIN GAME SCREEN === -->
<section class="scr on" id="s1">
<div class="st"><span>9:41</span><span>●●● 100%</span></div>

<div class="main">
<p class="title">돌을 깨서 보석을 얻으세요</p>
<p class="subtitle"><span id="userCount">1,532</span>명이 보석을 얻었어요</p>

<!-- Progress bar -->
<div class="progress">
<div class="progress-bar">
<div class="progress-fill" id="pf" style="width:0%"></div>
<div class="hammer-sm" id="hs"><svg viewBox="0 0 24 24" fill="none"><rect x="10" y="15" width="4" height="9" rx="1" fill="#8B6914"/><path d="M2 15L22 15L20 3L4 3Z" fill="#7a7a7a"/></svg></div>
</div>
<p class="progress-text" id="pt">0%</p>
</div>

<!-- Rock -->
<div class="rock" id="rk">
<img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 265 275'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%238a95a5'/%3E%3Cstop offset='45%25' stop-color='%235b6777'/%3E%3Cstop offset='100%25' stop-color='%233a4250'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M65 40 C85 20 120 15 145 28 C170 41 200 35 220 55 C240 75 245 105 235 130 C225 155 205 180 180 195 C155 210 120 215 95 205 C70 195 45 175 30 150 C15 125 10 90 20 65 C30 40 45 60 65 40Z' fill='url(%23g)'/%3E%3Ccircle cx='85' cy='70' r='4' fill='rgba(0,0,0,.04)'/%3E%3Ccircle cx='130' cy='65' r='3.5' fill='rgba(0,0,0,.04)'/%3E%3Ccircle cx='175' cy='85' r='4' fill='rgba(0,0,0,.03)'/%3E%3Ccircle cx='105' cy='120' r='3.5' fill='rgba(0,0,0,.03)'/%3E%3Ccircle cx='160' cy='140' r='4' fill='rgba(0,0,0,.03)'/%3E%3Ccircle cx='80' cy='160' r='3' fill='rgba(0,0,0,.04)'/%3E%3Cellipse cx='90' cy='60' rx='20' ry='10' fill='rgba(255,255,255,.04)' transform='rotate(-15 90 60)'/%3E%3C/svg%3E" alt="돌">
<div class="hit" id="hit"></div>
</div>

<!-- Large hammer -->
<div class="hammer-lg" id="hl">
<svg viewBox="0 0 126 126" fill="none">
<rect x="54" y="82" width="18" height="44" rx="3" fill="#8B6914" stroke="#6B4F10" stroke-width="1.5"/>
<rect x="50" y="118" width="26" height="8" rx="2" fill="#6B4F10"/>
<path d="M14 80L112 80L106 14L20 14Z" fill="#7a7a7a" stroke="#5a5a5a" stroke-width="2"/>
<path d="M20 14L32 36L94 36L106 14Z" fill="#929292"/>
<rect x="38" y="16" width="50" height="6" rx="2" fill="#666"/>
</svg>
</div>

<!-- Bottom card -->
<div class="card">
<div class="card-row">
<div class="card-text">오늘 남은 보석 <span class="count" id="rc">5개</span></div>
<div class="card-btn" id="ab">
<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="10" y="17" width="4" height="7" rx="1" fill="white"/><path d="M3 16L21 16L19 4L5 4Z" fill="white"/></svg>
광고 보고 더 깨기
</div>
</div>
<div class="gem-row">
<div class="gem-item" id="g0"><svg viewBox="0 0 40 32"><rect width="40" height="32" rx="4" fill="rgba(79,195,247,.15)"/><text x="20" y="22" text-anchor="middle" font-size="16">💎</text></svg></div>
<div class="gem-item" id="g1"><svg viewBox="0 0 40 32"><rect width="40" height="32" rx="4" fill="rgba(56,142,60,.15)"/><text x="20" y="22" text-anchor="middle" font-size="16">🟢</text></svg></div>
<div class="gem-item" id="g2"><svg viewBox="0 0 40 32"><rect width="40" height="32" rx="4" fill="rgba(211,47,47,.15)"/><text x="20" y="22" text-anchor="middle" font-size="16">❤️</text></svg></div>
<div class="gem-item" id="g3"><svg viewBox="0 0 40 32"><rect width="40" height="32" rx="4" fill="rgba(123,31,162,.15)"/><text x="20" y="22" text-anchor="middle" font-size="16">🔮</text></svg></div>
<div class="gem-item faded" id="g4"><svg viewBox="0 0 40 32"><rect width="40" height="32" rx="4" fill="rgba(249,168,37,.15)"/><text x="20" y="22" text-anchor="middle" font-size="16">⭐</text></svg></div>
</div>
</div>

<!-- Particles -->
<div class="particles" id="pt"></div>

<!-- Result popup -->
<div class="popup" id="popup">
<div class="popup-card">
<div class="gem-display" id="pe">💎</div>
<h2 id="pn">다이아 획득!</h2>
<p class="value" id="pv">300만원</p>
<button class="popup-btn" id="cb">📺 광고 보고 보석 받기</button>
<button style="background:transparent;color:rgba(255,255,255,.3);font-size:13px;font-weight:600;padding:8px" id="sb">그냥 저장하기</button>
</div>
</div>

<!-- Ad overlay -->
<div class="ad" id="ad">
<div class="ad-box"><h2>광고 시청 중...</h2><div class="ad-timer" id="atm"><span id="ac">3</span></div><p>끝까지 시청하면 보석이 저장됩니다</p></div>
</div>

<div class="toast" id="t1"></div>
</div>
</section>

</div>
<script>
const GEMS=[
{n:'다이아',e:'💎',v:300,c:'#4fc3f7'},
{n:'에메랄드',e:'🟢',v:200,c:'#388e3c'},
{n:'사파이어',e:'🔮',v:100,c:'#7b1fa2'},
{n:'루비',e:'❤️',v:50,c:'#d32f2f'},
{n:'금',e:'⭐',v:20,c:'#f9a825'}
];
const S={pct:0,rocks:5,inv:[0,0,0,0,1,3],tv:0,an:false,hit:0};
const $=id=>document.getElementById(id);
const qsa=s=>[...document.querySelectorAll(s)];

function pk(){let r=Math.random()*100,a=0;const GEMS2=[...GEMS,{n:'다이아2',e:'💎',v:300,c:'#4fc3f7'}];return GEMS[Math.floor(Math.random()*5)]}

function mv(v){return`${v.toLocaleString()}만원`}

function ts(m,i='t1'){const e=$(i);e.textContent=m;e.classList.remove('on');void e.offsetWidth;e.classList.add('on')}

function updateGems(){
const items=qsa('.gem-item');
S.rocks>0?items.forEach((el,i)=>{i<S.rocks?el.classList.remove('faded'):el.classList.add('faded')}):items.forEach(el=>el.classList.add('faded'));
$('rc').textContent=S.rocks+'개';
}

function hitRock(){
if(S.an||S.rocks<=0||S.pct>=100)return;
S.an=true;

// Hammer swing
const hl=$('hl');hl.classList.remove('swing');void hl.offsetWidth;hl.classList.add('swing');
// Rock shrink
const rk=$('rk');rk.style.setProperty('--rs',Math.max(.7,1-S.pct/100*.3));

// Impact
const hit=$('hit');hit.className='hit on';setTimeout(()=>hit.className='hit off',80);

// Particles
spawnP();

// Increase progress (10% per tap per Figma specs)
S.hit++;let inc=10;S.pct=Math.min(100,S.pct+inc);
$('pf').style.width=S.pct+'%';
$('pt').textContent=S.pct+'%';

// Move small hammer along progress bar
const hs=$('hs');hs.style.left=`calc(50% + ${(S.pct-50)/100*310}px)`;

setTimeout(()=>{S.an=false},200);

if(S.pct>=100)setTimeout(()=>rockBreak(),350);
}

function spawnP(){
const c=$('pt');
for(let i=0;i<6;i++){
const p=document.createElement('div');p.className='p';
p.style.cssText=`background:${['#6c4fff','#5e99ff','#f394ff','#9fa9ff','#6c4fff','#5e99ff'][i]};left:${40+Math.random()*20}%;top:${40+Math.random()*20}%;--px:${(Math.random()>.5?1:-1)*(40+Math.random()*60)}px;--py:${(Math.random()>.5?1:-1)*(40+Math.random()*60)}px;--ps:${.6+Math.random()*.8}`;
c.appendChild(p);setTimeout(()=>p.remove(),550);
}
}

function rockBreak(){
const g=pk();
S.inv[GEMS.indexOf(g)]=(S.inv[GEMS.indexOf(g)]||0)+1;
S.tv+=g.v;
$('pe').textContent=g.e;
$('pn').textContent=g.n+' 획득!';
$('pv').textContent=mv(g.v);
$('popup').classList.add('on');

S.rocks--;S.pct=0;S.hit=0;
$('pf').style.width='0%';
$('pt').textContent='0%';
const rk=$('rk');rk.style.setProperty('--rs',1);
updateGems();
}

function runAd(cb){
const ad=$('ad'),ac=$('ac');
ad.classList.add('on');let l=3;ac.textContent=l;ad.style.setProperty('--ap','0%');
const iv=setInterval(()=>{l--;ac.textContent=Math.max(0,l);ad.style.setProperty('--ap',((3-l)/3*100)+'%');if(l<=0){clearInterval(iv);ad.classList.remove('on');cb()}},850);
}

// Rock click
$('rk').addEventListener('click',hitRock);

// Collect from popup
$('cb').addEventListener('click',()=>runAd(()=>{
$('popup').classList.remove('on');
ts('보석함에 저장되었어요!');
}));

// Skip ad (just save without ad)
$('sb').addEventListener('click',()=>{
$('popup').classList.remove('on');
ts('보석을 저장했어요!');
});

// 광고 보고 더 깨기
$('ab').addEventListener('click',()=>{
if(S.rocks<=0){runAd(()=>{S.rocks=1;updateGems();ts('보석 1개가 추가되었어요!');})}
});

updateGems();
</script>
</body>
</html>
